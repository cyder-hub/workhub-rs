services:
  workhub-rs:
    build:
      context: .
      dockerfile: Dockerfile
    image: workhub-rs:local
    restart: unless-stopped
    environment:
      MCP_HTTP_PATH: "${MCP_HTTP_PATH:-/mcp}"
      MCP_TOOL_PROFILE: "${MCP_TOOL_PROFILE:-basic}"
      MCP_TOOLSETS: "${MCP_TOOLSETS:-}"
      MCP_ENABLED_TOOLS: "${MCP_ENABLED_TOOLS:-}"
      MCP_DISABLED_TOOLS: "${MCP_DISABLED_TOOLS:-}"
      MCP_TOOL_CALL_DEBUG: "${MCP_TOOL_CALL_DEBUG:-false}"
      RUST_LOG: "${RUST_LOG:-}"
      JIRA_URL: "${JIRA_URL:-}"
      JIRA_USERNAME: "${JIRA_USERNAME:-}"
      JIRA_API_TOKEN: "${JIRA_API_TOKEN:-}"
      JIRA_PASSWORD: "${JIRA_PASSWORD:-}"
      JIRA_PERSONAL_TOKEN: "${JIRA_PERSONAL_TOKEN:-}"
      JIRA_SSL_VERIFY: "${JIRA_SSL_VERIFY:-}"
      JIRA_PROJECTS_FILTER: "${JIRA_PROJECTS_FILTER:-}"
      JIRA_TIMEOUT: "${JIRA_TIMEOUT:-}"
      JIRA_HTTP_PROXY: "${JIRA_HTTP_PROXY:-}"
      JIRA_HTTPS_PROXY: "${JIRA_HTTPS_PROXY:-}"
      JIRA_NO_PROXY: "${JIRA_NO_PROXY:-}"
      JIRA_CUSTOM_HEADERS: "${JIRA_CUSTOM_HEADERS:-}"
      JIRA_CLIENT_CERT: "${JIRA_CLIENT_CERT:-}"
      JIRA_CLIENT_KEY: "${JIRA_CLIENT_KEY:-}"
      CONFLUENCE_URL: "${CONFLUENCE_URL:-}"
      CONFLUENCE_USERNAME: "${CONFLUENCE_USERNAME:-}"
      CONFLUENCE_API_TOKEN: "${CONFLUENCE_API_TOKEN:-}"
      CONFLUENCE_PASSWORD: "${CONFLUENCE_PASSWORD:-}"
      CONFLUENCE_PERSONAL_TOKEN: "${CONFLUENCE_PERSONAL_TOKEN:-}"
      CONFLUENCE_SSL_VERIFY: "${CONFLUENCE_SSL_VERIFY:-}"
      CONFLUENCE_SPACES_FILTER: "${CONFLUENCE_SPACES_FILTER:-}"
      CONFLUENCE_TIMEOUT: "${CONFLUENCE_TIMEOUT:-}"
      CONFLUENCE_HTTP_PROXY: "${CONFLUENCE_HTTP_PROXY:-}"
      CONFLUENCE_HTTPS_PROXY: "${CONFLUENCE_HTTPS_PROXY:-}"
      CONFLUENCE_NO_PROXY: "${CONFLUENCE_NO_PROXY:-}"
      CONFLUENCE_CUSTOM_HEADERS: "${CONFLUENCE_CUSTOM_HEADERS:-}"
      CONFLUENCE_CLIENT_CERT: "${CONFLUENCE_CLIENT_CERT:-}"
      CONFLUENCE_CLIENT_KEY: "${CONFLUENCE_CLIENT_KEY:-}"
      GITLAB_URL: "${GITLAB_URL:-}"
      GITLAB_TOKEN: "${GITLAB_TOKEN:-}"
      GITLAB_PERSONAL_TOKEN: "${GITLAB_PERSONAL_TOKEN:-}"
      GITLAB_SSL_VERIFY: "${GITLAB_SSL_VERIFY:-}"
      GITLAB_PROJECTS_FILTER: "${GITLAB_PROJECTS_FILTER:-}"
      GITLAB_TIMEOUT: "${GITLAB_TIMEOUT:-}"
      GITLAB_HTTP_PROXY: "${GITLAB_HTTP_PROXY:-}"
      GITLAB_HTTPS_PROXY: "${GITLAB_HTTPS_PROXY:-}"
      GITLAB_NO_PROXY: "${GITLAB_NO_PROXY:-}"
      GITLAB_CUSTOM_HEADERS: "${GITLAB_CUSTOM_HEADERS:-}"
      GITLAB_CLIENT_CERT: "${GITLAB_CLIENT_CERT:-}"
      GITLAB_CLIENT_KEY: "${GITLAB_CLIENT_KEY:-}"
      ATLASSIAN_USERNAME: "${ATLASSIAN_USERNAME:-}"
      ATLASSIAN_API_TOKEN: "${ATLASSIAN_API_TOKEN:-}"
      ATLASSIAN_PASSWORD: "${ATLASSIAN_PASSWORD:-}"
      ATLASSIAN_PERSONAL_TOKEN: "${ATLASSIAN_PERSONAL_TOKEN:-}"
      ATLASSIAN_SSL_VERIFY: "${ATLASSIAN_SSL_VERIFY:-}"
      ATLASSIAN_TIMEOUT: "${ATLASSIAN_TIMEOUT:-}"
      ATLASSIAN_HTTP_PROXY: "${ATLASSIAN_HTTP_PROXY:-}"
      ATLASSIAN_HTTPS_PROXY: "${ATLASSIAN_HTTPS_PROXY:-}"
      ATLASSIAN_NO_PROXY: "${ATLASSIAN_NO_PROXY:-}"
      ATLASSIAN_CUSTOM_HEADERS: "${ATLASSIAN_CUSTOM_HEADERS:-}"
      ATLASSIAN_CLIENT_CERT: "${ATLASSIAN_CLIENT_CERT:-}"
      ATLASSIAN_CLIENT_KEY: "${ATLASSIAN_CLIENT_KEY:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
    ports:
      - "${MCP_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/healthz | grep -q '\"status\":\"ok\"'",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
