name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  service:
    name: Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust 1.94
        shell: bash
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component rustfmt
          rustup default 1.94.0

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check MCP server without warnings
        run: RUSTFLAGS="-Dwarnings" cargo check

      - name: Test MCP server
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Smoke stdio transport
        run: cargo xtask smoke jira stdio

      - name: Smoke streamable HTTP transport
        run: cargo xtask smoke jira http

      - name: Smoke Jira mock tools
        run: cargo xtask smoke jira restricted

      - name: Smoke Confluence mock tools
        run: cargo xtask smoke confluence all

      - name: Smoke GitLab mock tools
        run: cargo xtask smoke gitlab all

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config

      - name: Build image
        run: docker build -t workhub-rs:ci -f Dockerfile .

      - name: Smoke container health endpoint
        shell: bash
        run: |
          docker run --rm -d --name workhub-rs-ci -p 18080:8000 workhub-rs:ci
          trap 'docker rm -f workhub-rs-ci >/dev/null 2>&1 || true' EXIT
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/workhub-rs-health.json; then
              grep -q '"status":"ok"' /tmp/workhub-rs-health.json
              exit 0
            fi
            sleep 1
          done
          docker logs workhub-rs-ci
          exit 1
